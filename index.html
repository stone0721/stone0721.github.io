<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
    <!-- 粒子背景 -->
    <div id="particles-js"></div>

    <!-- 全屏头部区域 -->
    <header>
        <!-- data-text 用于 CSS 里的故障动画 -->
        <h1 class="glitch" data-text="ddddd">ddddd</h1>
        
        <!-- 使用 typewriter-text 类名触发 JS 打字效果 -->
        <p class="subtitle typewriter-text" data-aos="fade-in" data-aos-delay="500"></p>
        
        <div class="scroll-down-btn" onclick="document.getElementById('content').scrollIntoView({behavior: 'smooth'})">
            <span>﹀</span>
        </div>
    </header>

    <!-- 文章列表 -->
    <section id="content" class="container">
        <h2 class="section-title" data-aos="fade-right">最新文章</h2>
        <div class="post-list" id="postList">
            <!-- JS 动态加载 -->
            <div style="text-align:center; width:100%; margin-top:50px; color:var(--primary);">
                加载中...
            </div>
        </div>
    </section>

    <!-- 脚本引入 -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="assets/js/script.js"></script>
</body>
</html>
