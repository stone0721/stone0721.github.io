<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页</title>
    <meta name="description" content="用粒子、渐变和流畅动画打造的极简个人博客">
    <link rel="stylesheet" href="assets/css/styles.css">
    <!-- AOS 动画库 -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
    <!-- 粒子背景 -->
    <div id="particles-js"></div>

    <!-- 预加载动画 -->
    <div id="preloader">
        <div class="spinner"></div>
        <p class="loading-text">加载中...</div>
    </div>

    <!-- 主内容 -->
    <header data-aos="fade-down" data-aos-duration="1500">
        <h1>个人博客</h1>
        <p class="subtitle" data-aos="fade-up" data-aos-delay="400">专注逆向工程、Web安全</p>
    </header>

    <section id="posts" class="container">
        <h2 data-aos="zoom-in" data-aos-delay="200">最新文章</h2>
        <div class="post-list" id="postList">
            <!-- JS 动态插入文章卡片 -->
        </div>
    </section>

    <!-- 脚本 -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="assets/js/script.js"></script>
</body>
</html>
