<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章加载中...</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/styles/atom-one-dark-reasonable.min.css">
</head>
<body>
    <div id="particles-js"></div>
    <div class="scanlines"></div>

    <!-- 顶部导航 -->
    <div class="slide-down-intro">
        <a href="index.html" class="back-home-btn">
            <span class="cmd">cd</span> .. <span class="comment">// 返回首页</span>
        </a>

        <div class="container article-container">
            <div id="article-content" class="markdown-body">
                <div class="loading-terminal">
                    > 正在解析 Markdown...<br>
                    > 渲染中...
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.7.0/highlight.min.js"></script>
    <script src="assets/js/script.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const postFile = urlParams.get('post'); 
            if(postFile) {
                loadArticle(postFile);
            } else {
                document.getElementById('article-content').innerHTML = '<h2 style="color:#ff5555;">ERROR: 404 文章未找到</h2>';
            }
        });
    </script>
</body>
</html>
