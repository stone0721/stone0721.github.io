name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate posts/index.json
        run: |
          echo '{"posts":["' > posts/index.json
          ls posts/*.md | sort -r | sed 's|posts/||' | sed 's|\.md|", "|g' | paste -sd "" - | sed 's/, $//' >> posts/index.json
          echo '"],"generated":"'$(date -u +"%Y-%m-%d %H:%M:%S")'"}' >> posts/index.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4