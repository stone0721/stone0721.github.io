# .github/workflows/update-post-list.yml
name: Auto Update Posts List

on:
  push:
    paths:
      - 'posts/*.md'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate posts/index.json
        run: |
          echo '{"posts": [' > posts/index.json
          # 按文件名倒序（建议你用 2025-11-20-title.md 这种格式命名）
          ls -1 posts/*.md | grep -v "template.md" | sort -r | while read file; do
            filename=$(basename "$file")
            echo "  \"$filename\","
          done >> posts/index.json
          # 删除最后多余的逗号
          sed -i '$ s/,$/ ]/' posts/index.json
          echo ',"generated_at": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'"}' >> posts/index.json

      - name: Commit and push if changed
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add posts/index.json
          git diff --quiet && echo "No changes" && exit 0
          git commit -m "Auto update posts list" 
          git push